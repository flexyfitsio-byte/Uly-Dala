{% extends "base.html" %}
{% block title %}ИИ-гид — Uly Dala{% endblock %}

{% block content %}
<section class="section shell">
  <div class="section-head">
    <div>
      <h2>ИИ-гид</h2>
      <div class="sub">Опиши, куда хочешь поехать — маршрут соберётся только из проверенных мест</div>
    </div>
  </div>

  <div class="ornate-frame" style="max-width: 720px;">
    <div class="form-field">
      <label>Куда и что хочется</label>
      <textarea id="userMessage" rows="3" placeholder="Например: хочу на выходные недалеко от Астаны, люблю природу"></textarea>
    </div>
    <div class="flex gap-12" style="flex-wrap: wrap;">
      <div class="form-field" style="flex:1; min-width:140px;">
        <label>Бюджет (₸/день)</label>
        <input type="number" id="budgetInput" placeholder="25000">
      </div>
      <div class="form-field" style="flex:1; min-width:140px;">
        <label>Количество дней</label>
        <input type="number" id="daysInput" value="2" min="1" max="14">
      </div>
      <div class="form-field" style="flex:1; min-width:160px;">
        <label>Категория</label>
        <select id="categoryInput">
          <option value="">Любая</option>
          <option value="nature">Природа</option>
          <option value="history">История</option>
        </select>
      </div>
    </div>
    <button class="btn btn-gold" onclick="generateRoute()">Составить маршрут</button>
  </div>

  <div id="routeResult" class="mt-24"></div>
</section>
{% endblock %}

{% block extra_scripts %}
<script>
async function generateRoute() {
  const message = document.getElementById('userMessage').value.trim();
  const budget = document.getElementById('budgetInput').value;
  const days = document.getElementById('daysInput').value;
  const category = document.getElementById('categoryInput').value;
  const resultBox = document.getElementById('routeResult');

  if (!message) {
    resultBox.innerHTML = '<div class="text-muted">Опиши, куда хочешь поехать.</div>';
    return;
  }

  resultBox.innerHTML = '<div class="text-muted">ИИ-гид собирает маршрут...</div>';

  const res = await fetch('/api/ai/route', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, budget, days, category })
  });
  const data = await res.json();

  if (data.error) {
    resultBox.innerHTML = `<div class="ornate-frame" style="border-color:#D97757;">${data.error}</div>`;
    return;
  }

  let html = `<div class="ornate-frame">
    <h3 style="color:var(--gold-soft); margin-bottom:6px;">${data.destination_name}</h3>
    <div class="text-muted" style="margin-bottom:18px;">Итого: ${data.total_estimated_cost.toLocaleString('ru-RU')} ₸</div>`;

  data.days.forEach(day => {
    html += `<div style="margin-bottom:16px;">
      <div class="badge-xp" style="margin-bottom:8px;">День ${day.day_number}</div>`;
    day.activities.forEach(act => {
      html += `<div style="padding:10px 0; border-top:1px solid rgba(201,161,90,0.15);">
        <strong style="color:var(--cream);">${act.time} — ${act.location}</strong>
        <div class="text-muted" style="font-size:0.88rem; margin-top:4px;">${act.description}</div>
        <div class="price-tag" style="margin-top:4px;">${act.cost.toLocaleString('ru-RU')} ₸</div>
      </div>`;
    });
    html += `</div>`;
  });

  if (data.note) {
    html += `<div class="text-muted" style="font-size:0.8rem; margin-top:10px;">${data.note}</div>`;
  }

  html += `</div>`;
  resultBox.innerHTML = html;
}
</script>
{% endblock %}
